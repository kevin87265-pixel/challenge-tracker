<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>社群競賽追蹤系統</title>
<style>
:root {
  --bg:#0f0f13;--bg2:#1a1a22;--bg3:#24242f;--bg4:#2e2e3d;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#f0f0f5;--text2:#9090a8;--text3:#5a5a72;
  --gold:#e8b84b;--gold-bg:rgba(232,184,75,0.1);--gold-bd:rgba(232,184,75,0.3);
  --blue:#5b8af0;--blue-bg:rgba(91,138,240,0.1);--blue-bd:rgba(91,138,240,0.3);
  --green:#4ecb8d;--green-bg:rgba(78,203,141,0.1);--green-bd:rgba(78,203,141,0.3);
  --red:#f06b5b;--red-bg:rgba(240,107,91,0.1);--red-bd:rgba(240,107,91,0.3);
  --orange:#f0955b;--orange-bg:rgba(240,149,91,0.1);--orange-bd:rgba(240,149,91,0.3);
  --purple:#a78cf0;--purple-bg:rgba(167,140,240,0.1);--purple-bd:rgba(167,140,240,0.3);
  --r:14px;--rs:8px;--r2:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding:0 0 84px;min-height:100vh;}
.screen{display:none;padding:0 15px;}
.screen.active{display:block;}

/* TOP BAR */
.top-bar{padding:18px 0 10px;text-align:center;}
.top-bar h1{font-size:18px;font-weight:800;letter-spacing:.3px;}
.top-bar p{font-size:12px;color:var(--text2);margin-top:3px;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 12px;border-radius:var(--r2);background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-bd);margin-bottom:7px;letter-spacing:.5px;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px;}
.card-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.6px;margin-bottom:11px;text-transform:uppercase;}
.sec-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px;}

/* BUTTONS */
.btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.2px;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--blue);color:#fff;}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-gold{background:var(--gold);color:#1a1200;}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:var(--rs);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* INPUTS */
.inp{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg3);color:var(--text);outline:none;}
.inp:focus{border-color:var(--blue);}
.inp-sm{padding:8px 11px;font-size:13px;}
.inp-num{width:130px;text-align:right;font-weight:700;font-size:15px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);outline:none;}
.inp-num:focus{border-color:var(--blue);}

/* LOGIN */
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:15px;}
.name-btn{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r);padding:22px 12px;font-size:16px;font-weight:800;cursor:pointer;text-align:center;transition:all .2s;color:var(--text);}
.name-btn .av{font-size:34px;margin-bottom:7px;display:block;}
.name-btn.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.admin-link{font-size:12px;color:var(--text3);text-align:center;cursor:pointer;margin-top:13px;padding:8px;}

/* WEEK TABS */
.wtabs{display:flex;gap:5px;margin-bottom:13px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.wtabs::-webkit-scrollbar{display:none;}
.wtab{flex-shrink:0;font-size:12px;font-weight:700;padding:6px 13px;border-radius:var(--r2);border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;letter-spacing:.2px;white-space:nowrap;}
.wtab.active{background:var(--bg3);color:var(--text);border-color:var(--border3);}
.wtab.current{border-color:var(--blue-bd);color:var(--blue);}
.wtab.active.current{background:var(--blue-bg);}

/* DAY GRID */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:13px;}
.day-btn{height:44px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;}
.day-btn .ds{font-size:8px;line-height:1;}
.day-btn.today{border-color:var(--blue-bd);color:var(--blue);}
.day-btn.submitted{background:var(--orange-bg);border-color:var(--orange-bd);color:var(--orange);}
.day-btn.approved{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.day-btn.rejected{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}
.day-btn.selected{border:2px solid var(--text);color:var(--text);}

/* TASK ROWS */
.t-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
.t-row:last-child{border-bottom:none;}
.t-check{width:23px;height:23px;border-radius:6px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:transparent;}
.t-check.done{background:var(--green);border-color:var(--green);}
.t-check.done::after{content:'';width:10px;height:6px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translateY(-2px);display:block;}
.t-label{font-size:14px;color:var(--text);flex:1;font-weight:500;}
.t-detail{font-size:11px;color:var(--text3);margin-top:1px;}

/* NUMBER INPUT ROWS */
.n-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.n-row:last-child{border-bottom:none;}
.n-label{flex:1;}
.n-label .t-label{font-size:14px;}
.n-label .t-detail{font-size:11px;color:var(--text3);margin-top:2px;}

/* SEG */
.seg{display:flex;background:var(--bg3);border-radius:var(--rs);padding:3px;gap:3px;margin-bottom:14px;}
.seg-btn{flex:1;padding:8px 6px;border:none;background:transparent;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s;letter-spacing:.1px;}
.seg-btn.active{background:var(--bg2);color:var(--text);border:1px solid var(--border2);}

/* INFO ROWS */
.i-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.i-row:last-child{border-bottom:none;}
.i-label{color:var(--text2);}
.i-value{color:var(--text);font-weight:700;}

/* SCORE GRID */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.sc-card{background:var(--bg3);border-radius:var(--rs);padding:13px;text-align:center;}
.sc-num{font-size:26px;font-weight:900;color:var(--text);}
.sc-lbl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}

/* RANKING */
.rk-row{display:flex;align-items:center;gap:11px;padding:11px 9px;border-radius:var(--rs);margin-bottom:5px;}
.rk-row.me{background:var(--blue-bg);border:1px solid var(--blue-bd);}
.rk-medal{font-size:21px;width:28px;text-align:center;flex-shrink:0;}
.rk-av{width:40px;height:40px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;border:1px solid var(--border2);}
.rk-name{flex:1;font-size:15px;font-weight:800;}
.rk-score{font-size:16px;font-weight:900;color:var(--gold);}

/* WEEK HERO */
.w-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px;display:flex;justify-content:space-between;align-items:flex-start;}
.w-hero-l .wn{font-size:16px;font-weight:900;margin-bottom:3px;}
.w-hero-l .wm{font-size:12px;color:var(--text2);}
.w-hero-l .wp{font-size:11px;color:var(--text3);margin-top:3px;}
.w-hero-r{text-align:right;flex-shrink:0;margin-left:10px;}
.prize{font-size:22px;font-weight:900;color:var(--gold);}
.settle{font-size:11px;color:var(--text3);margin-top:1px;}
.extra{font-size:11px;color:var(--orange);margin-top:2px;}

/* NOTICE */
.notice{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:var(--text2);margin-bottom:13px;line-height:1.6;}
.notice.warn{border-color:var(--orange-bd);background:var(--orange-bg);color:var(--orange);}
.notice.ok{border-color:var(--green-bd);background:var(--green-bg);color:var(--green);}
.notice.info{border-color:var(--blue-bd);background:var(--blue-bg);color:var(--blue);}

/* TAGS */
.tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 9px;border-radius:var(--r2);letter-spacing:.3px;}
.tag-pending{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd);}
.tag-approved{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.tag-rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:5px 8px 9px;gap:3px;z-index:100;}
.nb{flex:1;padding:7px 4px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--text3);border-radius:var(--rs);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:700;letter-spacing:.1px;}
.nb.active{color:var(--blue);background:var(--blue-bg);}
.ni{width:19px;height:19px;}

/* ADMIN CARDS */
.rev-card{background:var(--bg3);border-radius:var(--r);padding:13px;margin-bottom:10px;border:1px solid var(--border);}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px;}
.cmp-c{border:1px solid var(--border);border-radius:var(--rs);padding:11px;text-align:center;background:var(--bg2);}
.cmp-c.win{border-color:var(--gold-bd);background:var(--gold-bg);}
.cmp-n{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:700;}
.cmp-c.win .cmp-n{color:var(--gold);}
.cmp-stat{font-size:10px;color:var(--text3);margin-bottom:1px;}
.cmp-val{font-size:19px;font-weight:900;color:var(--text);}
.cmp-c.win .cmp-val{color:var(--gold);}
.win-btns{display:flex;gap:7px;margin-bottom:10px;}
.win-pick{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg2);font-size:13px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s;}
.win-pick.sel{border-color:var(--gold-bd);background:var(--gold-bg);color:var(--gold);}
.ck-rev{background:var(--bg3);border-radius:var(--r);padding:13px;margin-bottom:9px;border:1px solid var(--border);}
.act-btns{display:flex;gap:7px;margin-top:10px;}
.act-approve{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--green-bd);background:var(--green-bg);font-size:13px;font-weight:700;cursor:pointer;color:var(--green);}
.act-reject{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--red-bd);background:var(--red-bg);font-size:13px;font-weight:700;cursor:pointer;color:var(--red);}

/* ADMIN MGMT */
.mgmt-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);}
.mgmt-row:last-child{border-bottom:none;}
.mgmt-label{flex:1;font-size:13px;color:var(--text);}
.mgmt-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.del-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--red-bd);background:var(--red-bg);color:var(--red);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.add-row{display:flex;gap:8px;align-items:center;margin-top:10px;}

/* PROG BAR */
.prog-bg{width:80px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}

/* TOAST */
.toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 20px;font-size:13px;font-weight:700;color:var(--text);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.toast.show{opacity:1;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;padding:22px 18px 30px;width:100%;max-width:480px;}
.modal h3{font-size:16px;font-weight:900;margin-bottom:15px;}
.modal .close-x{float:right;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;margin-top:-2px;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:11px 0;}

/* DELTA */
.d-plus{color:var(--green);font-weight:900;}
.d-minus{color:var(--red);font-weight:900;}

/* EMPTY */
.empty{text-align:center;padding:28px 0;font-size:13px;color:var(--text3);}

/* AVATAR */
.color-picker{display:flex;gap:9px;justify-content:center;margin-top:10px;}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;flex-shrink:0;}
.color-dot.sel{border-color:#fff;transform:scale(1.18);}
.av-circle{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;margin:0 auto;}
</style>
</head>
<body>
<div class="app">
<div id="toast" class="toast"></div>

<!-- MODALS -->
<div id="modal-admin" class="modal-bg">
  <div class="modal">
    <button class="close-x" onclick="closeModal('admin')">×</button>
    <h3>主管登入 🔐</h3>
    <input class="inp" type="password" id="admin-pw" placeholder="輸入管理密碼" style="margin-bottom:12px;" />
    <button class="btn btn-primary" onclick="adminLogin()">登入</button>
  </div>
</div>

<div id="modal-add-week" class="modal-bg">
  <div class="modal">
    <button class="close-x" onclick="closeModal('add-week')">×</button>
    <h3>新增週數</h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">KPI 任務將從前一週複製，可進入「週設定」再調整</div>
    <div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:5px;">週主題（例：第6週｜互動爆發週）</label><input class="inp" id="new-week-title" placeholder="第X週｜主題週" /></div>
    <div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:5px;">競賽重點說明</label><input class="inp" id="new-week-metric" placeholder="例：留言互動數最高" /></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <div><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:5px;">期間（例：5/04–5/10）</label><input class="inp inp-sm" id="new-week-period" placeholder="5/04–5/10" /></div>
      <div><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:5px;">結算日（例：5/11）</label><input class="inp inp-sm" id="new-week-settle" placeholder="5/11" /></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
      <div><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:5px;">競賽獎金 NT$</label><input class="inp inp-sm" id="new-week-prize" type="number" placeholder="1000" /></div>
      <div><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:5px;">業績獎金（選填）</label><input class="inp inp-sm" id="new-week-extra" placeholder="留空則不顯示" /></div>
    </div>
    <button class="btn btn-gold" onclick="confirmAddWeek()">建立週數</button>
  </div>
</div>

<div id="modal-week-settings" class="modal-bg">
  <div class="modal" style="max-height:85vh;overflow-y:auto;">
    <button class="close-x" onclick="closeModal('week-settings')">×</button>
    <h3 id="wset-title">週設定</h3>
    <div class="card-title">KPI 任務</div>
    <div id="wset-kpi-list"></div>
    <div class="add-row">
      <input class="inp inp-sm" id="new-kpi-label" placeholder="任務名稱（例：直播場次）" style="flex:1;" />
      <input class="inp inp-sm" id="new-kpi-detail" placeholder="說明（例：每週1場）" style="width:130px;" />
      <button class="btn btn-sm btn-primary" onclick="addKpi()" style="width:60px;">＋ 加</button>
    </div>
    <div class="divider"></div>
    <div class="notice info" style="margin-top:10px;">補填數據欄位為全部週共用，請至「設定」頁面的上方區塊新增或刪除。</div>
    <div id="wset-fields-list" style="display:none;"></div>
    <div style="margin-top:14px;">
      <button class="btn btn-ghost btn-sm" onclick="deleteWeek()" style="width:100%;color:var(--red);border-color:var(--red-bd);">刪除此週</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="top-bar">
    <div class="badge">競賽追蹤系統</div>
    <h1>社群爆發計畫</h1>
    <p>每日任務 · 數據回報 · 即時排名</p>
  </div>
  <div style="margin-top:20px;">
    <div class="name-grid">
      <button class="name-btn" id="btn-凱" onclick="selName('阿凱',this)">
        <div class="av-circle" id="av-login-凱" style="background:#5b8af0;">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none"><circle cx="19" cy="13" r="7" fill="rgba(255,255,255,0.9)"/><path d="M5 34c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="rgba(255,255,255,0.9)"/></svg>
        </div>
        <span style="font-size:15px;font-weight:800;">阿凱</span>
        <div class="color-picker" id="cp-凱" onclick="event.stopPropagation()"></div>
      </button>
      <button class="name-btn" id="btn-安" onclick="selName('阿安',this)">
        <div class="av-circle" id="av-login-安" style="background:#e8b84b;">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none"><circle cx="19" cy="13" r="7" fill="rgba(255,255,255,0.9)"/><path d="M5 34c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="rgba(255,255,255,0.9)"/></svg>
        </div>
        <span style="font-size:15px;font-weight:800;">阿安</span>
        <div class="color-picker" id="cp-安" onclick="event.stopPropagation()"></div>
      </button>
    </div>
    <button class="btn btn-primary" onclick="doLogin()">進入系統</button>
    <div class="admin-link" onclick="openModal('admin')">主管入口 →</div>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="top-bar">
    <h1 id="main-hi"></h1>
    <p id="main-date"></p>
  </div>

  <div id="tab-today" class="tc">
    <div id="week-info-bar"></div>
    <div id="wh-today"></div>
    <div class="card">
      <div class="seg">
        <button class="seg-btn active" id="sg-checkin" onclick="switchSeg('checkin')">今日任務</button>
        <button class="seg-btn" id="sg-data" onclick="switchSeg('data')">補填數據</button>
      </div>
      <div id="sg-checkin-c">
        <div id="checkin-body"></div>

// Parse "M/D" string into a Date object (current year)
function parseDate(str){
  const [m,d]=str.trim().split('/').map(Number);
  return new Date(new Date().getFullYear(),m-1,d);
}
// Auto-detect current week index from WEEKS[i].period (format "M/D–M/D")
function getCurrentWeek(){
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<WEEKS.length;i++){
    const parts=WEEKS[i].period.split('–');
    if(parts.length<2) continue;
    const start=parseDate(parts[0]);
    const end=parseDate(parts[1]);end.setHours(23,59,59,999);
    if(today>=start&&today<=end) return i;
  }
  // Before first week → week 0; after last week → last week
  const firstStart=parseDate(WEEKS[0].period.split('–')[0]);
  if(today<firstStart) return 0;
  return WEEKS.length-1;
}

function calcScores(wIdx){
  const sc={};EMPLOYEES.forEach(e=>sc[e.name]=0);
  Object.entries(STATE.checkins).filter(([,v])=>v.wIdx===wIdx&&v.status==='rejected').forEach(([,v])=>{sc[v.user]=(sc[v.user]||0)-5;});
  for(let d=0;d<7;d++){const e=STATE.scores[scKey(wIdx,d)];if(e&&e.winner&&e.winner!=='tie')sc[e.winner]=(sc[e.winner]||0)+e.points;}
  return sc;
}

  }).join('');

function pickWinner(dk,name){STATE.adminWinnerPick[dk]=name;renderAdminData();}
async function approveDay(dk,wIdx,day){
  const winner=STATE.adminWinnerPick[dk];if(!winner)return;
  let pts=10;
  if(winner!=='tie'){let streak=0;for(let d=day-1;d>=0;d--){const sk=scKey(wIdx,d);if(STATE.scores[sk]?.winner===winner)streak++;else break;}if(streak>=1)pts+=5;}
  const sk=scKey(wIdx,day);
  const scoreRecord={wIdx,day,winner:winner==='tie'?null:winner,points:pts,ts:Date.now()};
  await Promise.all(EMPLOYEES.map(e=>approveViewData(e.name,wIdx,day)));
  await saveScore(sk,scoreRecord);
  delete STATE.adminWinnerPick[dk];
  showToast(winner==='tie'?'平手，未計分':`${winner} +${pts}分 🥇`,'ok');
  renderAdminData();renderAdminBoard();
}

function delKpi(i){
  if(!confirm('確定刪除此任務？'))return;
  WEEKS[STATE.editingWeekIdx].kpi.splice(i,1);saveWeeks();renderWSetKpi();showToast('已刪除','ok');
}
function addField(){
  const label=document.getElementById('new-field-label').value.trim();
  const detail=document.getElementById('new-field-detail').value.trim();
  if(!label){showToast('請輸入欄位名稱','err');return;}
  WEEKS[STATE.editingWeekIdx].dataFields.push({id:genId(),label,detail});
  saveWeeks();document.getElementById('new-field-label').value='';document.getElementById('new-field-detail').value='';
  renderWSetFields();showToast('已新增欄位','ok');
}
function delField(i){
  if(!confirm('確定刪除此欄位？'))return;
  WEEKS[STATE.editingWeekIdx].dataFields.splice(i,1);saveWeeks();renderWSetFields();showToast('已刪除','ok');
}
function deleteWeek(){
  if(WEEKS.length<=1){showToast('至少保留一週','err');return;}
  if(!confirm(`確定刪除「${WEEKS[STATE.editingWeekIdx].title}」？`))return;
  WEEKS.splice(STATE.editingWeekIdx,1);saveWeeks();
  STATE.adminSelWeek=Math.min(STATE.adminSelWeek,WEEKS.length-1);
  STATE.selWeek=STATE.adminSelWeek;
  closeModal('week-settings');renderAdmin();showToast('已刪除週數','ok');
}

function confirmAddWeek(){
  const title=document.getElementById('new-week-title').value.trim();
  const metric=document.getElementById('new-week-metric').value.trim();
  const period=document.getElementById('new-week-period').value.trim();
  const settle=document.getElementById('new-week-settle').value.trim();
  const prize=parseInt(document.getElementById('new-week-prize').value)||1000;
  const extra=document.getElementById('new-week-extra').value.trim();
  if(!title){showToast('請輸入週主題','err');return;}
  const prev=WEEKS[WEEKS.length-1];
  const newWeek={
    id:WEEKS.length+1,title,sub:title.split('｜')[1]||title,period,settle,
    metric:metric||'競賽指標',prize,extraPrize:extra,
    kpi:JSON.parse(JSON.stringify(prev.kpi)),
    bonus:JSON.parse(JSON.stringify(prev.bonus)),
    rules:JSON.parse(JSON.stringify(prev.rules)),
    penalty:prev.penalty,reverse:prev.reverse||'',
  };
  WEEKS.push(newWeek);saveWeeks();
  closeModal('add-week');
  ['new-week-title','new-week-metric','new-week-period','new-week-settle','new-week-extra'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('new-week-prize').value='';
  STATE.adminSelWeek=WEEKS.length-1;renderAdmin();
  showToast('已新增第'+WEEKS.length+'週 🎉','ok');
}

// keyboard
document.getElementById('admin-pw').addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin();});

// init avatar color pickers
renderColorPickers();
</script>
